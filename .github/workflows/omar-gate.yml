name: Omar Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      scan_mode:
        description: Sentinelayer scan profile
        required: false
        default: deep
        type: choice
        options:
          - pr-diff
          - deep
          - nightly
      severity_gate:
        description: Severity threshold that blocks merge
        required: false
        default: P1
        type: choice
        options:
          - P0
          - P1
          - P2
          - none

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

concurrency:
  group: omar-gate-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  precheck:
    name: Omar Gate Precheck
    runs-on: ubuntu-22.04
    outputs:
      allow_scan: ${{ steps.gate.outputs.allow_scan }}
    permissions:
      contents: read
    steps:
      - id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork || false }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "pull_request" ] && [ "${IS_FORK_PR}" = "true" ]; then
            echo "allow_scan=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping privileged Omar scan for forked pull_request events."
            exit 0
          fi
          echo "allow_scan=true" >> "${GITHUB_OUTPUT}"

  omar_gate:
    name: Omar Gate
    needs: [precheck]
    if: needs.precheck.outputs.allow_scan == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate managed Omar secret
        shell: bash
        env:
          SENTINELAYER_TOKEN: ${{ secrets.SENTINELAYER_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${SENTINELAYER_TOKEN}" ]; then
            echo "::add-mask::${SENTINELAYER_TOKEN}"
          fi
          if [ -z "${SENTINELAYER_TOKEN}" ]; then
            echo "::error::Missing SENTINELAYER_TOKEN for managed Omar capacity."
            exit 1
          fi

      - name: Run Omar Gate
        id: omar
        uses: ./
        with:
          github_token: ${{ github.token }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          google_api_key: ${{ secrets.GOOGLE_GEMINI_API_KEY || secrets.GOOGLE_API_KEY }}
          llm_provider: openai
          sentinelayer_token: ${{ secrets.SENTINELAYER_TOKEN }}
          sentinelayer_managed_llm: true
          scan_mode: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_mode || 'deep' }}
          severity_gate: ${{ github.event_name == 'workflow_dispatch' && inputs.severity_gate || 'P1' }}
          model: ${{ vars.OMAR_MODEL || 'gpt-5.3-codex' }}
          codex_model: ${{ vars.OMAR_CODEX_MODEL || 'gpt-5.3-codex' }}
          model_fallback: ${{ vars.OMAR_MODEL_FALLBACK || 'gemini-2.5-flash' }}
          use_codex: true
          codex_only: false
          llm_failure_policy: block

      - name: Emit Omar summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Omar Gate"
            echo "- run_id: \`${{ steps.omar.outputs.run_id }}\`"
            echo "- gate_status: \`${{ steps.omar.outputs.gate_status }}\`"
            echo "- findings: \`P0=${{ steps.omar.outputs.p0_count }} P1=${{ steps.omar.outputs.p1_count }} P2=${{ steps.omar.outputs.p2_count }} P3=${{ steps.omar.outputs.p3_count }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  fork_static:
    name: Omar Gate Fork Static
    needs: [precheck]
    if: needs.precheck.outputs.allow_scan != 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Run deterministic fork fallback checks
        shell: bash
        run: |
          set -euo pipefail
          tracked_env_files="$(git ls-files | grep -E '(^|/)\.env(\..+)?$' | grep -Ev '^\.env\.example$' || true)"
          if [ -n "${tracked_env_files}" ]; then
            echo "::error::Tracked dotenv files are not allowed in fork PRs:"
            echo "${tracked_env_files}"
            exit 1
          fi
          python -m compileall -q src scripts

  finalize:
    name: Omar Gate Finalize
    if: always()
    needs: [precheck, omar_gate, fork_static]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Consolidate Omar result
        shell: bash
        env:
          ALLOW_SCAN: ${{ needs.precheck.outputs.allow_scan || '' }}
          OMAR_GATE_RESULT: ${{ needs.omar_gate.result || '' }}
          FORK_STATIC_RESULT: ${{ needs.fork_static.result || '' }}
        run: |
          set -euo pipefail
          if [ "${ALLOW_SCAN}" = "true" ]; then
            if [ "${OMAR_GATE_RESULT}" != "success" ]; then
              echo "::error::Omar Gate result is '${OMAR_GATE_RESULT}'."
              exit 1
            fi
            exit 0
          fi
          if [ "${FORK_STATIC_RESULT}" != "success" ]; then
            echo "::error::Fork static result is '${FORK_STATIC_RESULT}'."
            exit 1
          fi
