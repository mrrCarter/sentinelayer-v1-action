name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install quality gate tooling
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ruff pytest

      - name: Validate action bridge sources compile
        run: |
          set -euo pipefail
          python -m compileall -q src

      - name: Lint bridge sources
        run: |
          set -euo pipefail
          python -m ruff check src tests

      - name: Run bridge unit tests
        env:
          PYTHONPATH: src
        run: |
          set -euo pipefail
          python -m pytest -q tests

      - name: Validate action metadata
        run: |
          set -euo pipefail
          test -s action.yml
          grep -q "sentinelayer_token" action.yml
          grep -q "python -m omargate.main" action.yml
