outputs:
  gate_status:
    description: 'Gate result: passed, blocked, queued, or error'
    value: ${{ steps.omar.outputs.gate_status }}
  p0_count:
    description: 'Number of P0 findings'
    value: ${{ steps.omar.outputs.p0_count }}
  p1_count:
    description: 'Number of P1 findings'
    value: ${{ steps.omar.outputs.p1_count }}
  p2_count:
    description: 'Number of P2 findings'
    value: ${{ steps.omar.outputs.p2_count }}
  p3_count:
    description: 'Number of P3 findings'
    value: ${{ steps.omar.outputs.p3_count }}
  run_id:
    description: 'Run identifier (investigation run when available)'
    value: ${{ steps.omar.outputs.run_id }}
  findings_artifact:
    description: 'Legacy output retained for compatibility (empty in bridge mode)'
    value: ${{ steps.omar.outputs.findings_artifact }}
  pack_summary_artifact:
    description: 'Legacy output retained for compatibility (empty in bridge mode)'
    value: ${{ steps.omar.outputs.pack_summary_artifact }}
  ingest_artifact:
    description: 'Legacy output retained for compatibility (empty in bridge mode)'
    value: ${{ steps.omar.outputs.ingest_artifact }}
  codebase_ingest_artifact:
    description: 'Legacy output retained for compatibility (empty in bridge mode)'
    value: ${{ steps.omar.outputs.codebase_ingest_artifact }}
  codebase_ingest_summary_artifact:
    description: 'Legacy output retained for compatibility (empty in bridge mode)'
    value: ${{ steps.omar.outputs.codebase_ingest_summary_artifact }}
  codebase_ingest_summary_md_artifact:
    description: 'Legacy output retained for compatibility (empty in bridge mode)'
    value: ${{ steps.omar.outputs.codebase_ingest_summary_md_artifact }}
  review_brief_artifact:
    description: 'Legacy output retained for compatibility (empty in bridge mode)'
    value: ${{ steps.omar.outputs.review_brief_artifact }}
  audit_report_artifact:
    description: 'Legacy output retained for compatibility (empty in bridge mode)'
    value: ${{ steps.omar.outputs.audit_report_artifact }}
  estimated_cost_usd:
    description: 'Legacy output retained for compatibility (empty in bridge mode)'
    value: ${{ steps.omar.outputs.estimated_cost_usd }}
  idempotency_key:
    description: 'Legacy output retained for compatibility'
    value: ${{ steps.omar.outputs.idempotency_key }}
  scan_mode:
    description: 'Configured scan mode for this run'
    value: ${{ steps.omar.outputs.scan_mode }}
  severity_gate:
    description: 'Configured severity gate threshold for this run'
    value: ${{ steps.omar.outputs.severity_gate }}
  llm_provider:
    description: 'Legacy output retained for compatibility'
    value: ${{ steps.omar.outputs.llm_provider }}
  model:
    description: 'Legacy output retained for compatibility'
    value: ${{ steps.omar.outputs.model }}
  model_fallback:
    description: 'Legacy output retained for compatibility'
    value: ${{ steps.omar.outputs.model_fallback }}
  model_fallback_used:
    description: 'Legacy output retained for compatibility'
    value: ${{ steps.omar.outputs.model_fallback_used }}
  policy_pack:
    description: 'Legacy output retained for compatibility'
    value: ${{ steps.omar.outputs.policy_pack }}
  policy_pack_version:
    description: 'Legacy output retained for compatibility'
    value: ${{ steps.omar.outputs.policy_pack_version }}

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.11'

    - name: Execute Omar Gate Compatibility Bridge
      id: omar
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        SENTINELAYER_TOKEN: ${{ inputs.sentinelayer_token }}
        INPUT_SENTINELAYER_TOKEN: ${{ inputs.sentinelayer_token }}
        INPUT_SENTINELAYER_API_URL: ${{ inputs.sentinelayer_api_url }}
        INPUT_SCAN_MODE: ${{ inputs.scan_mode }}
        INPUT_SEVERITY_GATE: ${{ inputs.severity_gate }}
        INPUT_PROVIDER_INSTALLATION_ID: ${{ inputs.provider_installation_id }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_WAIT_FOR_COMPLETION: ${{ inputs.wait_for_completion }}
        INPUT_WAIT_TIMEOUT_SECONDS: ${{ inputs.wait_timeout_seconds }}
        INPUT_WAIT_POLL_SECONDS: ${{ inputs.wait_poll_seconds }}
        INPUT_PR_NUMBER: ${{ inputs.pr_number }}
      run: |
        set -euo pipefail
        export PYTHONPATH="${GITHUB_ACTION_PATH}/src:${PYTHONPATH:-}"
        python -m omargate.main

