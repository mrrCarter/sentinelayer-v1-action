name: 'Omar Gate'
description: 'Thin compatibility action that delegates scans to Sentinelayer GitHub App backend'
author: 'Sentinelayer'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  sentinelayer_token:
    description: 'Sentinelayer bearer token used to call backend trigger/status APIs'
    required: true
    default: ''
  sentinelayer_api_url:
    description: 'Sentinelayer API base URL'
    required: false
    default: 'https://api.sentinelayer.com'
  scan_mode:
    description: 'Scan mode command mapper: baseline, deep, full-depth'
    required: false
    default: 'deep'
  severity_gate:
    description: 'Minimum severity to block merge: P0, P1, P2, or none'
    required: false
    default: 'P1'
  provider_installation_id:
    description: 'Optional GitHub App installation id override'
    required: false
    default: ''
  command:
    description: 'Optional explicit slash command override (example: /omar baseline)'
    required: false
    default: ''
  wait_for_completion:
    description: 'Wait for backend run completion before exiting'
    required: false
    default: 'true'
  wait_timeout_seconds:
    description: 'Max wait time for backend run completion'
    required: false
    default: '900'
  wait_poll_seconds:
    description: 'Polling interval for run status endpoint'
    required: false
    default: '10'
  pr_number:
    description: 'Optional PR number override (useful for workflow_dispatch)'
    required: false
    default: ''

  # Deprecated compatibility inputs (accepted but ignored)
  openai_api_key:
    description: 'Deprecated. Ignored in compatibility mode.'
    required: false
    default: ''
  llm_provider:
    description: 'Deprecated. Ignored in compatibility mode.'
    required: false
    default: ''
  anthropic_api_key:
