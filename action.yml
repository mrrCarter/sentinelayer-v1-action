name: 'Omar Gate'
description: 'Compatibility action that delegates scans to Sentinelayer GitHub App pipeline'
author: 'Sentinelayer'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  sentinelayer_token:
    description: 'Sentinelayer service token used to authorize run orchestration'
    required: true
    default: ''
  status_poll_token:
    description: 'Optional token for status polling when wait_for_completion=true'
    required: false
    default: ''
  sentinelayer_api_url:
    description: 'Sentinelayer API base URL'
    required: false
    default: 'https://api.sentinelayer.com'
  scan_mode:
    description: 'Scan mode command mapper: baseline, deep, audit, full-depth'
    required: false
    default: 'deep'
  severity_gate:
    description: 'Minimum severity to block merge: P0, P1, P2, or none'
    required: false
    default: 'P1'
  provider_installation_id:
    description: 'Optional GitHub App installation id override'
    required: false
    default: ''
  command:
    description: 'Optional explicit slash command override (example: /omar baseline)'
    required: false
    default: ''
  sentinelayer_spec_hash:
    description: 'Optional Sentinelayer spec hash (64-char hex) to bind run governance context'
    required: false
    default: ''
  sentinelayer_spec_id:
    description: 'Optional Sentinelayer spec UUID associated with sentinelayer_spec_hash'
    required: false
    default: ''
  spec_binding_mode:
    description: 'Spec binding mode: none, explicit, auto_discovered'
    required: false
    default: 'none'
  wait_for_completion:
    description: 'Wait for managed run completion before exiting'
    required: false
    default: 'true'
  wait_timeout_seconds:
    description: 'Max wait time for run completion'
    required: false
    default: '900'
  wait_poll_seconds:
    description: 'Polling interval for run status checks'
    required: false
    default: '10'
  pr_number:
    description: 'Optional PR number override (useful for workflow_dispatch)'
    required: false
    default: ''
  playwright_mode:
    description: 'Optional Playwright profile: off, baseline, or audit'
    required: false
    default: 'off'
  playwright_node_version:
    description: 'Node.js version used when Playwright mode is enabled'
    required: false
    default: '20'
  playwright_base_url:
    description: 'Optional PLAYWRIGHT_TEST_BASE_URL override passed to Playwright command'
    required: false
    default: ''
  playwright_bootstrap:
    description: 'When true, run npm ci + playwright browser install before executing Playwright command'
    required: false
    default: 'true'
  playwright_baseline_command:
    description: 'Command executed for playwright_mode=baseline'
    required: false
    default: 'npm run test:e2e:baseline'
  playwright_audit_command:
    description: 'Command executed for playwright_mode=audit'
    required: false
    default: 'npm run test:e2e:audit'
  sbom_mode:
    description: 'Optional SBOM profile: off, baseline, or audit'
    required: false
    default: 'off'
  sbom_bootstrap:
    description: 'When true, install SBOM generator prerequisites before default SBOM commands'
    required: false
    default: 'true'
  sbom_output_dir:
    description: 'Output directory for SBOM artifacts'
    required: false
    default: '.sentinelayer/sbom'
  sbom_baseline_command:
    description: 'Optional command override for sbom_mode=baseline (empty uses default CycloneDX generation profile)'
    required: false
    default: ''
  sbom_audit_command:
    description: 'Optional command override for sbom_mode=audit (empty uses default CycloneDX generation profile)'
    required: false
    default: ''
  local_gates_enabled:
    description: 'When true, run the action-local Omar Gate 2.0 gate runner (static + security) before the backend bridge. Writes FINDINGS.jsonl to local_gates_output_dir.'
    required: false
    default: 'false'
  local_gates_output_dir:
    description: 'Directory for FINDINGS.jsonl emitted by the local gate runner (when local_gates_enabled=true)'
    required: false
    default: '.omargate/local'
  local_gates_fail_severity:
    description: 'Minimum severity that causes the local gate runner to exit non-zero: P0, P1, P2, P3, or never'
    required: false
    default: 'P1'

outputs:
  gate_status:
    description: 'Gate result: passed, blocked, queued, or error'
    value: ${{ steps.omar.outputs.gate_status }}
  p0_count:
    description: 'Number of P0 findings'
    value: ${{ steps.omar.outputs.p0_count }}
  p1_count:
    description: 'Number of P1 findings'
    value: ${{ steps.omar.outputs.p1_count }}
  p2_count:
    description: 'Number of P2 findings'
    value: ${{ steps.omar.outputs.p2_count }}
  p3_count:
    description: 'Number of P3 findings'
    value: ${{ steps.omar.outputs.p3_count }}
  run_id:
    description: 'Run identifier (investigation run when available)'
    value: ${{ steps.omar.outputs.run_id }}
  scan_mode:
    description: 'Configured scan mode for this run'
    value: ${{ steps.omar.outputs.scan_mode }}
  severity_gate:
    description: 'Configured severity gate threshold for this run'
    value: ${{ steps.omar.outputs.severity_gate }}
  playwright_status:
    description: 'Playwright execution status: skipped, passed, or failed'
    value: ${{ steps.omar.outputs.playwright_status }}
  playwright_mode:
    description: 'Effective Playwright mode used by this run'
    value: ${{ steps.omar.outputs.playwright_mode }}
  sbom_status:
    description: 'SBOM execution status: skipped, passed, or failed'
    value: ${{ steps.omar.outputs.sbom_status }}
  sbom_mode:
    description: 'Effective SBOM mode used by this run'
    value: ${{ steps.omar.outputs.sbom_mode }}
  local_gates_status:
    description: 'Status of the action-local Omar Gate 2.0 gate runner: skipped, passed, or blocked'
    value: ${{ steps.local_gates.outputs.status }}
  local_gates_findings_path:
    description: 'Absolute path to FINDINGS.jsonl emitted by the local gate runner (empty when skipped)'
    value: ${{ steps.local_gates.outputs.findings_path }}

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: '3.11'

    - name: Run local Omar Gate 2.0 gates
      id: local_gates
      if: ${{ inputs.local_gates_enabled == 'true' }}
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        INPUT_LOCAL_GATES_OUTPUT_DIR: ${{ inputs.local_gates_output_dir }}
        INPUT_LOCAL_GATES_FAIL_SEVERITY: ${{ inputs.local_gates_fail_severity }}
      run: |
        set -euo pipefail
        action_dir="${{ github.action_path }}"
        output_dir="${INPUT_LOCAL_GATES_OUTPUT_DIR:-.omargate/local}"
        fail_sev="${INPUT_LOCAL_GATES_FAIL_SEVERITY:-P1}"
        findings_path="${GITHUB_WORKSPACE}/${output_dir}/FINDINGS.jsonl"
        summary_path="${GITHUB_WORKSPACE}/${output_dir}/SUMMARY.json"
        mkdir -p "${GITHUB_WORKSPACE}/${output_dir}"

        set +e
        PYTHONPATH="${action_dir}/src" python -m omargate.local_gates \
          --path . \
          --output-dir "${GITHUB_WORKSPACE}/${output_dir}" \
          --fail-severity "${fail_sev}" \
          --json-summary \
          > "${summary_path}"
        rc=$?
        set -e

        status="passed"
        if [ "${rc}" -eq 1 ]; then
          status="blocked"
        elif [ "${rc}" -ne 0 ]; then
          status="error"
        fi

        echo "status=${status}" >> "${GITHUB_OUTPUT}"
        echo "findings_path=${findings_path}" >> "${GITHUB_OUTPUT}"

        # Surface the summary in the Step Summary for quick review
        {
          echo "### Omar Gate 2.0 — Local gates"
          echo ""
          echo "Status: \`${status}\` (rc=${rc}, fail_severity=${fail_sev})"
          echo ""
          echo '```json'
          cat "${summary_path}" || true
          echo ''
          echo '```'
        } >> "${GITHUB_STEP_SUMMARY}"

        if [ "${rc}" -eq 1 ]; then
          echo "::warning::Local gates blocked: at least one finding at or above ${fail_sev}. See FINDINGS.jsonl at ${findings_path}."
        elif [ "${rc}" -ne 0 ]; then
          echo "::error::Local gates runner errored (rc=${rc}). See step output."
          exit ${rc}
        fi

        # The FINDINGS.jsonl + SUMMARY.json are written to the user's workspace
        # (\${GITHUB_WORKSPACE}/\${output_dir}) so downstream workflow steps can
        # upload them as artifacts, parse them, or attach them to a PR comment.
        # This action doesn't upload by itself — leaves that choice to the
        # composing workflow.

    - name: Normalize Playwright mode
      id: playwright_mode
      shell: bash
      env:
        RAW_PLAYWRIGHT_MODE: ${{ inputs.playwright_mode }}
      run: |
        set -euo pipefail
        normalized="$(printf '%s' "${RAW_PLAYWRIGHT_MODE:-}" | tr '[:upper:]' '[:lower:]' | xargs)"
        effective="off"
        enabled="false"
        case "${normalized}" in
          baseline|smoke|pr)
            effective="baseline"
            enabled="true"
            ;;
          audit|deep|full|full-depth)
            effective="audit"
            enabled="true"
            ;;
        esac
        echo "effective=${effective}" >> "${GITHUB_OUTPUT}"
        echo "enabled=${enabled}" >> "${GITHUB_OUTPUT}"

    - name: Normalize SBOM mode
      id: sbom_mode
      shell: bash
      env:
        RAW_SBOM_MODE: ${{ inputs.sbom_mode }}
      run: |
        set -euo pipefail
        normalized="$(printf '%s' "${RAW_SBOM_MODE:-}" | tr '[:upper:]' '[:lower:]' | xargs)"
        effective="off"
        enabled="false"
        case "${normalized}" in
          baseline|smoke|pr)
            effective="baseline"
            enabled="true"
            ;;
          audit|deep|full|full-depth)
            effective="audit"
            enabled="true"
            ;;
        esac
        echo "effective=${effective}" >> "${GITHUB_OUTPUT}"
        echo "enabled=${enabled}" >> "${GITHUB_OUTPUT}"

    - name: Setup Node (Playwright/SBOM option)
      if: ${{ steps.playwright_mode.outputs.enabled == 'true' || steps.sbom_mode.outputs.enabled == 'true' }}
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: ${{ inputs.playwright_node_version }}
        cache: 'npm'

    - name: Execute Omar Gate Compatibility Bridge
      id: omar
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        SENTINELAYER_TOKEN: ${{ inputs.sentinelayer_token }}
        INPUT_SENTINELAYER_TOKEN: ${{ inputs.sentinelayer_token }}
        INPUT_STATUS_POLL_TOKEN: ${{ inputs.status_poll_token }}
        INPUT_SENTINELAYER_API_URL: ${{ inputs.sentinelayer_api_url }}
        INPUT_SCAN_MODE: ${{ inputs.scan_mode }}
        INPUT_SEVERITY_GATE: ${{ inputs.severity_gate }}
        INPUT_PROVIDER_INSTALLATION_ID: ${{ inputs.provider_installation_id }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_SENTINELAYER_SPEC_HASH: ${{ inputs.sentinelayer_spec_hash }}
        INPUT_SENTINELAYER_SPEC_ID: ${{ inputs.sentinelayer_spec_id }}
        INPUT_SPEC_BINDING_MODE: ${{ inputs.spec_binding_mode }}
        INPUT_WAIT_FOR_COMPLETION: ${{ inputs.wait_for_completion }}
        INPUT_WAIT_TIMEOUT_SECONDS: ${{ inputs.wait_timeout_seconds }}
        INPUT_WAIT_POLL_SECONDS: ${{ inputs.wait_poll_seconds }}
        INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        INPUT_PLAYWRIGHT_MODE: ${{ steps.playwright_mode.outputs.effective }}
        INPUT_PLAYWRIGHT_BASE_URL: ${{ inputs.playwright_base_url }}
        INPUT_PLAYWRIGHT_BOOTSTRAP: ${{ inputs.playwright_bootstrap }}
        INPUT_PLAYWRIGHT_BASELINE_COMMAND: ${{ inputs.playwright_baseline_command }}
        INPUT_PLAYWRIGHT_AUDIT_COMMAND: ${{ inputs.playwright_audit_command }}
        INPUT_SBOM_MODE: ${{ steps.sbom_mode.outputs.effective }}
        INPUT_SBOM_BOOTSTRAP: ${{ inputs.sbom_bootstrap }}
        INPUT_SBOM_OUTPUT_DIR: ${{ inputs.sbom_output_dir }}
        INPUT_SBOM_BASELINE_COMMAND: ${{ inputs.sbom_baseline_command }}
        INPUT_SBOM_AUDIT_COMMAND: ${{ inputs.sbom_audit_command }}
      run: |
        set -euo pipefail
        export PYTHONPATH="${GITHUB_ACTION_PATH}/src:${PYTHONPATH:-}"
        python -m omargate.main
