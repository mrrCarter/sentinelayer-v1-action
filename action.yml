name: 'Omar Gate'
description: 'AI-powered security gate that blocks P0/P1 vulnerabilities before merge'
author: 'Sentinelayer'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  # Required
  openai_api_key:
    description: 'OpenAI API key for LLM calls (BYO)'
    required: false
    default: ''

  llm_provider:
    description: 'LLM provider: openai, anthropic, google, xai'
    required: false
    default: 'openai'

  anthropic_api_key:
    description: 'Anthropic API key (required if llm_provider=anthropic)'
    required: false
    default: ''

  google_api_key:
    description: 'Google AI API key (required if llm_provider=google)'
    required: false
    default: ''

  xai_api_key:
    description: 'xAI API key (required if llm_provider=xai)'
    required: false
    default: ''

  # GitHub integration (recommended)
  github_token:
    description: 'GitHub token for posting check runs and comments (use github.token)'
    required: false
    default: ''

  # Sentinelayer integration (optional)
  sentinelayer_token:
    description: 'Sentinelayer API token for Tier 2/3 uploads (optional)'
    required: false
    default: ''

  sentinelayer_spec_id:
    description: 'Sentinelayer spec hash for spec-aware reviews. Generated by sentinelayer.com spec builder.'
    required: false
    default: ''

  sentinelayer_managed_llm:
    description: 'Use Sentinelayer-managed LLM proxy (free-trial mode). If false, auto-enabled when openai_api_key is empty and sentinelayer_token is set.'
    required: false
    default: 'false'

  telemetry_tier:
    description: 'Telemetry tier: 0=off, 1=aggregate, 2=metadata, 3=full artifacts'
    required: false
    default: '1'

  telemetry:
    description: 'Enable anonymous telemetry (opt-out). true/false'
    required: false
    default: 'true'

  share_metadata:
    description: 'Opt-in to Tier 2 metadata (repo identity + finding metadata). true/false'
    required: false
    default: 'false'

  share_artifacts:
    description: 'Opt-in to Tier 3 artifacts upload. true/false'
    required: false
    default: 'false'

  training_opt_in:
    description: 'Optional training consent (de-identified). true/false'
    required: false
    default: 'false'

  # Scan configuration
  scan_mode:
    description: 'Scan mode: pr-diff (fast), deep (full repo), nightly (alias of deep for scheduled runs)'
    required: false
    default: 'pr-diff'

  severity_gate:
    description: 'Minimum severity to block merge: P0, P1, P2, or none'
    required: false
    default: 'P1'

  model:
    description: 'LLM API model (used when Codex CLI is unavailable). Default is gpt-5.2-codex.'
    required: false
    default: 'gpt-5.2-codex'

  model_fallback:
    description: 'Fallback LLM API model (if primary model fails or quota exceeded)'
    required: false
    default: 'gpt-4.1-mini'

  llm_failure_policy:
    description: 'If LLM call fails: block (fail-closed), deterministic_only, allow_with_warning'
    required: false
    default: 'block'

  use_codex:
    description: 'Use Codex CLI for deep agentic audit (falls back to API)'
    required: false
    default: 'true'

  codex_only:
    description: 'Use Codex CLI as the only LLM path (disable API fallback)'
    required: false
    default: 'false'

  codex_model:
    description: 'Model for Codex CLI'
    required: false
    default: 'gpt-5.2-codex'

  codex_timeout:
    description: 'Timeout in seconds for Codex execution'
    required: false
    default: '300'

  run_harness:
    description: 'Run SentinelLayer portable security test harness'
    required: false
    default: 'true'

  pip_audit_ignore_ids:
    description: 'Comma-separated vulnerability IDs to ignore in pip-audit (example: CVE-2024-23342,GHSA-xxxx-xxxx-xxxx)'
    required: false
    default: ''

  # Rate limiting / cost control
  max_daily_scans:
    description: 'Maximum scans per repo per day (0 = unlimited)'
    required: false
    default: '20'

  min_scan_interval_minutes:
    description: 'Minimum minutes between scans for same PR (0 to disable)'
    required: false
    default: '0'

  rate_limit_fail_mode:
    description: "On GitHub API errors during rate limit enforcement: 'closed' (require approval) or 'open' (skip enforcement and proceed)"
    required: false
    default: 'closed'

  max_input_tokens:
    description: 'Maximum input tokens per scan (cost control)'
    required: false
    default: '100000'

  require_cost_confirmation:
    description: 'If estimated cost > $X, require manual confirmation (USD)'
    required: false
    default: '5.00'

  approval_mode:
    description: 'How to approve high-cost scans: pr_label, workflow_dispatch, or none'
    required: false
    default: 'pr_label'

  approval_label:
    description: 'PR label that approves high-cost scan'
    required: false
    default: 'sentinelayer:approved'

  # Fork handling
  fork_policy:
    description: 'Fork PR handling: block, limited (deterministic only), allow'
    required: false
    default: 'block'

  # Fixer options
  run_deterministic_fix:
    description: 'Run deterministic autofix (self-contained allowlist)'
    required: false
    default: 'false'

  run_llm_fix:
    description: 'Generate LLM fix patches (artifacts only, no auto-commit)'
    required: false
    default: 'false'

  auto_commit_fixes:
    description: 'Auto-commit deterministic fixes to PR branch'
    required: false
    default: 'false'

  # Policy pack controls
  policy_pack:
    description: 'Policy pack identifier'
    required: false
    default: 'omar'

  policy_pack_version:
    description: 'Policy pack version'
    required: false
    default: 'v1'

outputs:
  gate_status:
    description: 'Gate result: passed, blocked, bypassed, error'
    value: ${{ steps.omar.outputs.gate_status }}
  p0_count:
    description: 'Number of P0 findings'
    value: ${{ steps.omar.outputs.p0_count }}
  p1_count:
    description: 'Number of P1 findings'
    value: ${{ steps.omar.outputs.p1_count }}
  p2_count:
    description: 'Number of P2 findings'
    value: ${{ steps.omar.outputs.p2_count }}
  p3_count:
    description: 'Number of P3 findings'
    value: ${{ steps.omar.outputs.p3_count }}
  run_id:
    description: 'Unique run identifier'
    value: ${{ steps.omar.outputs.run_id }}
  findings_artifact:
    description: 'Path to findings JSONL artifact'
    value: ${{ steps.omar.outputs.findings_artifact }}
  pack_summary_artifact:
    description: 'Path to PACK_SUMMARY.json'
    value: ${{ steps.omar.outputs.pack_summary_artifact }}
  ingest_artifact:
    description: 'Path to INGEST.json (full ingest payload)'
    value: ${{ steps.omar.outputs.ingest_artifact }}
  codebase_ingest_artifact:
    description: 'Path to CODEBASE_INGEST.json (alias of INGEST.json)'
    value: ${{ steps.omar.outputs.codebase_ingest_artifact }}
  codebase_ingest_summary_artifact:
    description: 'Path to CODEBASE_INGEST_SUMMARY.json (codebase snapshot)'
    value: ${{ steps.omar.outputs.codebase_ingest_summary_artifact }}
  codebase_ingest_summary_md_artifact:
    description: 'Path to CODEBASE_INGEST_SUMMARY.md (human-readable snapshot)'
    value: ${{ steps.omar.outputs.codebase_ingest_summary_md_artifact }}
  review_brief_artifact:
    description: 'Path to REVIEW_BRIEF.md'
    value: ${{ steps.omar.outputs.review_brief_artifact }}
  audit_report_artifact:
    description: 'Path to AUDIT_REPORT.md'
    value: ${{ steps.omar.outputs.audit_report_artifact }}
  estimated_cost_usd:
    description: 'Estimated LLM cost for this run'
    value: ${{ steps.omar.outputs.estimated_cost_usd }}
  idempotency_key:
    description: 'Idempotency key used for dedupe'
    value: ${{ steps.omar.outputs.idempotency_key }}
  scan_mode:
    description: 'Configured scan mode for this run'
    value: ${{ steps.omar.outputs.scan_mode }}
  severity_gate:
    description: 'Configured severity gate threshold for this run'
    value: ${{ steps.omar.outputs.severity_gate }}
  llm_provider:
    description: 'Configured LLM provider for this run'
    value: ${{ steps.omar.outputs.llm_provider }}
  model:
    description: 'Configured primary LLM model for this run'
    value: ${{ steps.omar.outputs.model }}
  model_fallback:
    description: 'Configured fallback LLM model for this run'
    value: ${{ steps.omar.outputs.model_fallback }}
  model_fallback_used:
    description: 'Whether fallback model was used during this run'
    value: ${{ steps.omar.outputs.model_fallback_used }}
  policy_pack:
    description: 'Configured policy pack id for this run'
    value: ${{ steps.omar.outputs.policy_pack }}
  policy_pack_version:
    description: 'Configured policy pack version for this run'
    value: ${{ steps.omar.outputs.policy_pack_version }}

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Omar Gate dependencies
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install --no-cache-dir -r "${GITHUB_ACTION_PATH}/requirements.txt"

    - name: Install Codex CLI
      shell: bash
      run: |
        set -euo pipefail
        npm install -g @openai/codex@0.98.0
        codex --version

    - name: Execute Omar Gate
      id: omar
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        GOOGLE_API_KEY: ${{ inputs.google_api_key }}
        XAI_API_KEY: ${{ inputs.xai_api_key }}
        SENTINELAYER_TOKEN: ${{ inputs.sentinelayer_token }}
        GITHUB_TOKEN: ${{ inputs.github_token || github.token }}
        INPUT_OPENAI_API_KEY: ${{ inputs.openai_api_key }}
        INPUT_LLM_PROVIDER: ${{ inputs.llm_provider }}
        INPUT_ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        INPUT_GOOGLE_API_KEY: ${{ inputs.google_api_key }}
        INPUT_XAI_API_KEY: ${{ inputs.xai_api_key }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token || github.token }}
        INPUT_SENTINELAYER_TOKEN: ${{ inputs.sentinelayer_token }}
        INPUT_SENTINELAYER_SPEC_ID: ${{ inputs.sentinelayer_spec_id }}
        INPUT_SENTINELAYER_MANAGED_LLM: ${{ inputs.sentinelayer_managed_llm }}
        INPUT_TELEMETRY_TIER: ${{ inputs.telemetry_tier }}
        INPUT_TELEMETRY: ${{ inputs.telemetry }}
        INPUT_SHARE_METADATA: ${{ inputs.share_metadata }}
        INPUT_SHARE_ARTIFACTS: ${{ inputs.share_artifacts }}
        INPUT_TRAINING_OPT_IN: ${{ inputs.training_opt_in }}
        INPUT_SCAN_MODE: ${{ inputs.scan_mode }}
        INPUT_SEVERITY_GATE: ${{ inputs.severity_gate }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_MODEL_FALLBACK: ${{ inputs.model_fallback }}
        INPUT_LLM_FAILURE_POLICY: ${{ inputs.llm_failure_policy }}
        INPUT_USE_CODEX: ${{ inputs.use_codex }}
        INPUT_CODEX_ONLY: ${{ inputs.codex_only }}
        INPUT_CODEX_MODEL: ${{ inputs.codex_model }}
        INPUT_CODEX_TIMEOUT: ${{ inputs.codex_timeout }}
        INPUT_RUN_HARNESS: ${{ inputs.run_harness }}
        INPUT_PIP_AUDIT_IGNORE_IDS: ${{ inputs.pip_audit_ignore_ids }}
        INPUT_MAX_DAILY_SCANS: ${{ inputs.max_daily_scans }}
        INPUT_MIN_SCAN_INTERVAL_MINUTES: ${{ inputs.min_scan_interval_minutes }}
        INPUT_RATE_LIMIT_FAIL_MODE: ${{ inputs.rate_limit_fail_mode }}
        INPUT_MAX_INPUT_TOKENS: ${{ inputs.max_input_tokens }}
        INPUT_REQUIRE_COST_CONFIRMATION: ${{ inputs.require_cost_confirmation }}
        INPUT_APPROVAL_MODE: ${{ inputs.approval_mode }}
        INPUT_APPROVAL_LABEL: ${{ inputs.approval_label }}
        INPUT_FORK_POLICY: ${{ inputs.fork_policy }}
        INPUT_RUN_DETERMINISTIC_FIX: ${{ inputs.run_deterministic_fix }}
        INPUT_RUN_LLM_FIX: ${{ inputs.run_llm_fix }}
        INPUT_AUTO_COMMIT_FIXES: ${{ inputs.auto_commit_fixes }}
        INPUT_POLICY_PACK: ${{ inputs.policy_pack }}
        INPUT_POLICY_PACK_VERSION: ${{ inputs.policy_pack_version }}
      run: |
        set -euo pipefail
        export PYTHONPATH="${GITHUB_ACTION_PATH}/src:${PYTHONPATH:-}"
        python -m omargate.main
