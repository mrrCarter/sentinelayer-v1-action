# Reference workflow: handle `/omar fix <finding_id>` PR comments (#A26).
#
# Drop this file into `.github/workflows/` of any repo that uses Omar Gate
# to enable the audit-to-fix handoff. When a PR reviewer types
# `/omar fix <finding_id>` on a pull request, this workflow:
#
#   1. Downloads the latest FINDINGS.jsonl artifact from the most recent
#      Omar Gate run on the PR's head ref.
#   2. Invokes `omargate.fix_handoff_cli` to parse the command, check the
#      per-build rate limit, resolve the target finding, and emit a
#      persona-codegen dispatch plan.
#   3. Spawns `create-sentinelayer persona run <id> --mode codegen` with the
#      plan's file list. The codegen subcommand returns the deterministic
#      baseline findings plus a mode_config envelope (allowed-tools +
#      prompt suffix) that downstream LLM orchestration consumes.
#   4. Cuts a follow-up branch, persists the plan envelope as a commit
#      artifact, and opens a draft PR using `followup_pr_body`. The branch
#      is the handoff point: a downstream LLM-authoring job (with API keys
#      and `write` permission) consumes the envelope and pushes the diff.
#
# Security posture: only users with `write` or `admin` permission on the
# repo can trigger the fix handoff. Deny-by-default for everyone else.

name: Omar Fix Handoff

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  parse_and_dispatch:
    if: |
      github.event.issue.pull_request != null
        && contains(github.event.comment.body, '/omar fix')
        && (
          github.event.comment.author_association == 'OWNER'
            || github.event.comment.author_association == 'MEMBER'
            || github.event.comment.author_association == 'COLLABORATOR'
        )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/merge
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Omar Gate runner
        shell: bash
        run: |
          set -euo pipefail
          # Adjust this to match your org's install pattern (private registry,
          # git submodule, etc). The reference assumes the runner is already
          # vendored into the repo at .omar-gate-action or similar.
          test -d "${GITHUB_WORKSPACE}/.omar-gate-action" || \
            gh repo clone mrrCarter/sentinelayer-v1-action .omar-gate-action -- --depth 1

      - name: Download latest FINDINGS.jsonl
        id: findings
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/.omargate/latest"
          # Find the most recent Omar Gate run on the PR's head SHA.
          pr_head_sha="$(gh pr view "${{ github.event.issue.number }}" --json headRefOid --jq '.headRefOid')"
          run_id="$(
            gh run list --workflow 'Omar Gate' --limit 20 --json databaseId,headSha,status,conclusion \
              --jq "[.[] | select(.headSha == \"${pr_head_sha}\" and .status == \"completed\")][0].databaseId"
          )"
          if [ -z "${run_id}" ] || [ "${run_id}" = "null" ]; then
            echo "::warning::No completed Omar Gate run found for head SHA ${pr_head_sha}; skipping handoff."
            echo "skipped=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh run download "${run_id}" -n omar-gate-findings -D "${GITHUB_WORKSPACE}/.omargate/latest" || {
            echo "::warning::FINDINGS.jsonl artifact not available on run ${run_id}; skipping handoff."
            echo "skipped=1" >> "$GITHUB_OUTPUT"
            exit 0
          }
          echo "skipped=0" >> "$GITHUB_OUTPUT"

      - name: Parse command and build plan
        if: steps.findings.outputs.skipped == '0'
        id: plan
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          echo "${COMMENT_BODY}" > /tmp/omar-fix-comment.md
          PYTHONPATH="${GITHUB_WORKSPACE}/.omar-gate-action/src" python -m omargate.fix_handoff_cli \
            --path "${GITHUB_WORKSPACE}" \
            --findings-file "${GITHUB_WORKSPACE}/.omargate/latest/FINDINGS.jsonl" \
            --comment-body-file /tmp/omar-fix-comment.md \
            > /tmp/omar-fix-plan.json
          echo "plan_file=/tmp/omar-fix-plan.json" >> "$GITHUB_OUTPUT"
          cat /tmp/omar-fix-plan.json | python -m json.tool

      - name: Acknowledge on PR (decision)
        if: steps.plan.outputs.plan_file
        uses: actions/github-script@v7
        env:
          PLAN_FILE: ${{ steps.plan.outputs.plan_file }}
          PR_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const fs = require('fs');
            const plan = JSON.parse(fs.readFileSync(process.env.PLAN_FILE, 'utf-8'));
            if (!plan.command) return;
            const lines = [
              `**Omar fix handoff** for \`${plan.command.finding_id}\``,
              '',
              plan.decision
                ? `- **Decision:** ${plan.decision.accepted ? 'accepted' : 'declined'} — ${plan.decision.reason}`
                : '',
              plan.plan
                ? `- **Plan:** persona \`${plan.plan.persona}\` against \`${(plan.plan.files || []).join(', ')}\``
                : plan.error
                  ? `- **Error:** ${plan.error}`
                  : '',
              '',
              plan.plan
                ? `_Opening follow-up branch \`${plan.plan.branch_name}\`; codegen envelope will follow._`
                : '_No-op._',
            ].filter(Boolean);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: lines.join('\n'),
            });

      - name: Setup Node (for create-sentinelayer CLI)
        if: steps.plan.outputs.plan_file
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Spawn codegen envelope via create-sentinelayer
        if: steps.plan.outputs.plan_file
        id: codegen
        shell: bash
        env:
          PLAN_FILE: ${{ steps.plan.outputs.plan_file }}
        run: |
          set -euo pipefail
          accepted="$(python -c 'import json,os,sys; sys.exit(0 if json.load(open(os.environ["PLAN_FILE"])).get("plan") else 1)')" || {
            echo "::notice::No plan emitted — skipping codegen spawn."
            echo "skipped=1" >> "$GITHUB_OUTPUT"
            exit 0
          }
          persona="$(python -c 'import json,os; print(json.load(open(os.environ["PLAN_FILE"]))["plan"]["persona"])')"
          files_csv="$(python -c 'import json,os; print(",".join(json.load(open(os.environ["PLAN_FILE"]))["plan"]["files"]))')"
          branch="$(python -c 'import json,os; print(json.load(open(os.environ["PLAN_FILE"]))["plan"]["branch_name"])')"
          echo "persona=${persona}" >> "$GITHUB_OUTPUT"
          echo "files_csv=${files_csv}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          # Envelope = findings array + mode_config (allowedTools, promptSuffix)
          # the LLM edit loop consumes. Writing to .omargate/ so it ships
          # with the follow-up branch for the downstream authoring job.
          mkdir -p "${GITHUB_WORKSPACE}/.omargate"
          if [ -n "${files_csv}" ]; then
            npx --yes create-sentinelayer persona run "${persona}" \
              --mode codegen \
              --path "${GITHUB_WORKSPACE}" \
              --files "${files_csv}" \
              --json > "${GITHUB_WORKSPACE}/.omargate/codegen-envelope.json"
          else
            npx --yes create-sentinelayer persona run "${persona}" \
              --mode codegen \
              --path "${GITHUB_WORKSPACE}" \
              --json > "${GITHUB_WORKSPACE}/.omargate/codegen-envelope.json"
          fi
          echo "envelope=${GITHUB_WORKSPACE}/.omargate/codegen-envelope.json" >> "$GITHUB_OUTPUT"
          echo "skipped=0" >> "$GITHUB_OUTPUT"

      - name: Cut follow-up branch and open draft PR
        if: steps.codegen.outputs.skipped == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN_FILE: ${{ steps.plan.outputs.plan_file }}
          BRANCH: ${{ steps.codegen.outputs.branch }}
          PERSONA: ${{ steps.codegen.outputs.persona }}
          ENVELOPE: ${{ steps.codegen.outputs.envelope }}
          SOURCE_PR: ${{ github.event.issue.number }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "omar-gate-bot"
          git config user.email "omar-gate-bot@users.noreply.github.com"
          git switch -c "${BRANCH}"
          # The envelope commit is the handoff point. A downstream job
          # (with API creds) consumes .omargate/codegen-envelope.json,
          # drives the LLM edit loop under the envelope's allowedTools,
          # and pushes the diff onto this same branch. The draft PR is
          # opened here so the edit loop has a target to push into.
          git add .omargate/codegen-envelope.json
          git commit -m "omar fix: codegen envelope for ${PERSONA} (${BRANCH})"
          git push -u origin "${BRANCH}"
          python -c 'import json,os,sys; d=json.load(open(os.environ["PLAN_FILE"])); sys.stdout.write(d.get("followup_pr_body") or "")' > /tmp/omar-fix-body.md
          gh pr create \
            --draft \
            --base "$(gh pr view "${SOURCE_PR}" --json baseRefName --jq '.baseRefName')" \
            --head "${BRANCH}" \
            --title "omar fix: ${PERSONA} handoff for PR #${SOURCE_PR}" \
            --body-file /tmp/omar-fix-body.md
